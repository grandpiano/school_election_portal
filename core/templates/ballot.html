{% extends "base.html" %}

{% block title %}Official Digital Ballot{% endblock %}

{% block content %}
<style>
    /* Security: Lock the screen to the kiosk */
    .sidebar, .navbar-udes { display: none !important; }
    main { margin-left: 0 !important; width: 100% !important; background: #f8fafc; min-height: 100vh; }

    .ballot-card {
        border: 2px solid #e2e8f0;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        border-radius: 20px;
        background: white;
        position: relative;
        overflow: hidden;
    }
    
    .ballot-card.selected {
        border-color: #3B7BFF;
        background-color: #f0f7ff;
        box-shadow: 0 10px 15px -3px rgba(59, 123, 255, 0.1);
    }

    .candidate-img {
        height: 220px; /* Slightly taller for better visibility */
        width: 100%;
        object-fit: cover;
        background-color: #f1f5f9;
    }

    .vote-check {
        width: 28px;
        height: 28px;
        border: 2px solid #cbd5e1;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    .selected .vote-check {
        background-color: #3B7BFF;
        border-color: #3B7BFF;
        color: white;
    }

    .progress-bar-udes {
        height: 8px;
        border-radius: 10px;
        background: #e2e8f0;
        margin-bottom: 40px;
    }

    .progress-fill {
        height: 100%;
        background: #3B7BFF;
        border-radius: 10px;
        transition: width 0.4s ease;
    }
</style>

<div class="container py-5" style="max-width: 900px;">
    <div class="progress-bar-udes">
        <div id="p-fill" class="progress-fill" style="width: 0%"></div>
    </div>

    <div id="ballot-container">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">Preparing secure ballot...</p>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
        <button id="prevBtn" class="btn btn-light btn-lg px-4" onclick="changeStep(-1)" disabled>
            <i class="bi bi-chevron-left me-2"></i>Back
        </button>
        
        <div class="text-muted small fw-bold text-uppercase ls-1">
            UDES Secure Ballot System
        </div>

        <button id="nextBtn" class="btn btn-primary btn-lg text-white px-5" onclick="changeStep(1)">
            Next <i class="bi bi-chevron-right ms-2"></i>
        </button>
    </div>
</div>

<script>
    let currentStep = 0;
    let ballotData = [];
    let selections = {}; 

    async function loadBallot() {
        const token = sessionStorage.getItem('active_token');
        if(!token) { 
            window.location.href = "{% url 'kiosk_entry' %}"; 
            return; 
        }

        try {
            const response = await fetch("{% url 'validate_token' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-CSRFToken': '{{ csrf_token }}' 
                },
                body: JSON.stringify({ token: token })
            });

            const data = await response.json();
            if (response.ok) {
                ballotData = data.ballot;
                if (ballotData.length === 0) {
                    alert("No active positions found.");
                    window.location.href = "{% url 'kiosk_entry' %}";
                }
                renderStep();
            } else {
                sessionStorage.clear();
                window.location.href = "{% url 'kiosk_entry' %}";
            }
        } catch (error) {
            console.error("Ballot Load Error:", error);
            document.getElementById('ballot-container').innerHTML = `
                <div class="alert alert-danger">Connection error. Please alert an officer.</div>`;
        }
    }

    function renderStep() {
        const container = document.getElementById('ballot-container');
        const pos = ballotData[currentStep];
        
        const percent = ((currentStep + 1) / ballotData.length) * 100;
        document.getElementById('p-fill').style.width = percent + '%';

        let html = `
            <div class="mb-5">
                <h4 class="text-primary fw-bold mb-1">Position ${currentStep + 1} of ${ballotData.length}</h4>
                <h1 class="display-5 fw-bold text-dark">${pos.title}</h1>
                <p class="text-muted">Choose exactly one candidate for this office.</p>
            </div>
            <div class="row g-4">`;

        pos.candidates.forEach(cand => {
            const isSelected = selections[pos.id] === cand.id;
            
            // LOGIC: Check both possible field names just in case
            const finalPhoto = cand.photo_url || cand.photo || 'https://via.placeholder.com/400x300?text=No+Photo';

            html += `
                <div class="col-md-6 col-lg-4">
                    <div class="card ballot-card h-100 ${isSelected ? 'selected' : ''}" onclick="selectCandidate(${pos.id}, ${cand.id})">
                        <img src="${finalPhoto}" class="candidate-img" alt="${cand.name}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="fw-bold mb-0">${cand.name}</h5>
                                    <p class="text-muted small mb-0">Official Candidate</p>
                                </div>
                                <div class="vote-check">
                                    ${isSelected ? '<i class="bi bi-check-lg"></i>' : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        html += `</div>`;
        container.innerHTML = html;

        document.getElementById('prevBtn').disabled = currentStep === 0;
        document.getElementById('nextBtn').innerHTML = currentStep === ballotData.length - 1 
            ? 'Review & Cast Ballot <i class="bi bi-shield-check ms-2"></i>' 
            : 'Next Position <i class="bi bi-chevron-right ms-2"></i>';
    }

    function selectCandidate(posId, candId) {
        selections[posId] = candId;
        renderStep();
    }

    function changeStep(delta) {
        if (delta === 1 && !selections[ballotData[currentStep].id]) {
            alert("Please select a candidate to continue.");
            return;
        }

        if (currentStep + delta >= ballotData.length) {
            submitFinalBallot();
            return;
        }
        
        currentStep += delta;
        renderStep();
    }

    async function submitFinalBallot() {
        if (!confirm("Are you sure you want to cast your ballot?")) return;

        const token = sessionStorage.getItem('active_token');
        const nextBtn = document.getElementById('nextBtn');
        
        const voteData = {
            token: token,
            selections: Object.values(selections)
        };

        nextBtn.disabled = true;
        nextBtn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Casting...`;

        try {
            const response = await fetch("{% url 'submit_vote' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-CSRFToken': '{{ csrf_token }}' 
                },
                body: JSON.stringify(voteData)
            });

            if (response.ok) {
                sessionStorage.clear();
                window.location.href = "{% url 'vote_success' %}"; 
            } else {
                const result = await response.json();
                alert("ERROR: " + (result.error || "Submission failed."));
                window.location.href = "{% url 'kiosk_entry' %}";
            }
        } catch (error) {
            alert("Critical Network Error. Please contact the Admin.");
            nextBtn.disabled = false;
        }
    }

    window.onload = loadBallot;
</script>
{% endblock %}
