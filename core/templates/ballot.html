{% extends "base.html" %}
{% block title %}Official Digital Ballot{% endblock %}
{% block content %}
<style>
    .sidebar, .navbar-udes { display: none !important; }
    main { margin-left: 0 !important; width: 100% !important; background: #f8fafc; min-height: 100vh; }
    .ballot-card {
        border: 2px solid #e2e8f0;
        border-radius: 15px;
        background: white;
        padding: 20px;
        cursor: pointer;
        text-align: center;
        transition: 0.2s;
    }
    .ballot-card.selected { border-color: #3B7BFF; background-color: #f0f7ff; }
    .candidate-initials {
        width: 80px; height: 80px; background: #3B7BFF; color: white;
        border-radius: 50%; display: flex; align-items: center;
        justify-content: center; margin: 0 auto 15px; font-size: 24px; font-weight: bold;
    }
</style>

<div class="container py-5" style="max-width: 800px;">
    <div id="ballot-container">
        <h2 class="text-center">Loading Ballot...</h2>
    </div>
    <div class="d-flex justify-content-between mt-5">
        <button id="prevBtn" class="btn btn-secondary btn-lg" onclick="changeStep(-1)" disabled>Back</button>
        <button id="nextBtn" class="btn btn-primary btn-lg" onclick="changeStep(1)">Next</button>
    </div>
</div>

<script>
    let currentStep = 0;
    let ballotData = [];
    let selections = {};

    async function loadBallot() {
        const token = sessionStorage.getItem('active_token');
        const response = await fetch("{% url 'validate_token' %}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({ token: token })
        });
        const data = await response.json();
        if (response.ok) {
            ballotData = data.ballot;
            renderStep();
        } else { window.location.href = "{% url 'kiosk_entry' %}"; }
    }

    function renderStep() {
        const container = document.getElementById('ballot-container');
        const pos = ballotData[currentStep];
        let html = `<h1 class="text-center mb-4">${pos.title}</h1><div class="row g-3">`;
        
        pos.candidates.forEach(cand => {
            const isSelected = selections[pos.id] === cand.id;
            const initials = cand.name.split(' ').map(n => n[0]).join('');
            html += `
                <div class="col-md-6">
                    <div class="ballot-card ${isSelected ? 'selected' : ''}" onclick="selectCandidate(${pos.id}, ${cand.id})">
                        <div class="candidate-initials">${initials}</div>
                        <h3>${cand.name}</h3>
                    </div>
                </div>`;
        });
        container.innerHTML = html + `</div>`;
        document.getElementById('prevBtn').disabled = currentStep === 0;
        document.getElementById('nextBtn').innerText = currentStep === ballotData.length - 1 ? 'Submit Ballot' : 'Next';
    }

    function selectCandidate(p, c) { selections[p] = c; renderStep(); }

    function changeStep(d) {
        if (d === 1 && !selections[ballotData[currentStep].id]) return alert("Select a candidate");
        if (currentStep + d >= ballotData.length) return submitFinal();
        currentStep += d; renderStep();
    }

    async function submitFinal() {
        if(!confirm("Cast your vote?")) return;
        const response = await fetch("{% url 'submit_vote' %}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({ token: sessionStorage.getItem('active_token'), selections: Object.values(selections) })
        });
        if(response.ok) { sessionStorage.clear(); window.location.href = "{% url 'kiosk_entry' %}"; }
    }
    window.onload = loadBallot;
</script>
{% endblock %}
