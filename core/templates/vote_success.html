{% extends "base.html" %}

{% block title %}Vote Cast Successfully{% endblock %}

{% block content %}
<style>
    .sidebar, .navbar-udes { display: none !important; }
    main { margin-left: 0 !important; width: 100% !important; background: white; height: 100vh; display: flex; align-items: center; justify-content: center; }
    
    .success-container { text-align: center; max-width: 500px; padding: 2rem; }
    .check-icon { font-size: 5rem; color: #10B981; animation: scaleUp 0.5s ease-out; }
    
    @keyframes scaleUp {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.2); }
        100% { transform: scale(1); opacity: 1; }
    }
</style>

<div class="success-container">
    <div class="mb-4">
        <i class="bi bi-check-circle-fill check-icon"></i>
    </div>
    <h1 class="fw-bold text-dark">Ballot Cast!</h1>
    <p class="text-muted fs-5">Thank you for participating in UDES 2026. Your vote has been securely recorded and encrypted.</p>
    
    <div class="mt-5 p-4 bg-light rounded-4">
        <p class="small text-uppercase fw-bold text-primary mb-2">Terminal Resetting</p>
        <h4 id="countdown">Returning to entry in 5 seconds...</h4>
    </div>
</div>

<script>
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');

    const timer = setInterval(() => {
        seconds--;
        countdownEl.innerText = `Returning to entry in ${seconds} seconds...`;
        if (seconds <= 0) {
            clearInterval(timer);
            window.location.href = "{% url 'kiosk_entry' %}"; // Ensure this name matches your login/pin URL
        }
    }, 1000);
</script>
{% endblock %}
